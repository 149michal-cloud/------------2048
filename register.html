<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
<script defer src="/register.js"></script>
    <title>הרשמה למשחקים</title>
</head>
<body>
    <h1>יצירת חשבון</h1>
    <div class="menu-container" style="width: 320px;"> <div class="form-group">
            <label>שם מלא:</label>
            <input id="username" type="text" placeholder="איך קוראים לך?">
        </div>
        <div class="form-group">
            <label>אימייל:</label>
            <input id="email" type="email" placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label>בחירת כינוי (Username):</label>
            <input id="nickname" type="text" placeholder="הכינוי שיופיע בשיא הניקוד">
        </div>
        <div class="form-group">
            <label>סיסמה:</label>
            <input id="password" type="password" placeholder="לפחות 6 תווים">
        </div>

</html>
